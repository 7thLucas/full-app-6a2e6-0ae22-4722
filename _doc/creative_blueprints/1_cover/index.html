<style>
  .mode-landscape .sl-root { flex-direction: row; }
  .mode-portrait .sl-root { flex-direction: column; }
  .mode-landscape .sl-left { width: 56%; height: 100%; }
  .mode-landscape .sl-right { width: 44%; height: 100%; }
  .mode-portrait .sl-left { width: 100%; flex: 1.3; }
  .mode-portrait .sl-right { width: 100%; flex: 1; }
</style>

<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-root flex w-full h-full">

    <!-- LEFT: Dark brand panel -->
    <div class="sl-left flex flex-col justify-between p-12"
         style="background: linear-gradient(148deg, #0f0c29 0%, #302b63 55%, #1a1740 100%);">

      <!-- Top label -->
      <span class="self-start px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase"
            style="color: #fb923c; background: rgba(251,146,60,0.14); border: 1px solid rgba(251,146,60,0.28);">
        ✦ E-Commerce Marketing Platform
      </span>

      <!-- Headline block -->
      <div class="flex flex-col gap-5">
        <h1 class="font-extrabold text-white leading-tight"
            style="font-size: clamp(1.75rem, 3.5vw, 2.5rem); letter-spacing: -0.025em;">
          Where Great Deals<br/>Meet a Premium<br/>Experience
        </h1>
        <p class="text-sm font-light leading-relaxed" style="color: #a5b4fc; max-width: 310px;">
          Inspired by Flipkart, Amazon &amp; Meesho — reimagined with app-grade UI polish, dark mode, voice search, and smooth animations built for modern commerce.
        </p>
        <div class="flex flex-wrap gap-2">
          <span class="px-3 py-1 rounded-full text-xs font-medium"
                style="color: #e0e7ff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);">Hero Carousel</span>
          <span class="px-3 py-1 rounded-full text-xs font-medium"
                style="color: #e0e7ff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);">Dark Mode</span>
          <span class="px-3 py-1 rounded-full text-xs font-medium"
                style="color: #e0e7ff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);">Voice Search</span>
          <span class="px-3 py-1 rounded-full text-xs font-medium"
                style="color: #e0e7ff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);">Add to Cart</span>
        </div>
      </div>

      <!-- Attribution -->
      <data-attribution />

    </div>

    <!-- RIGHT: Product visual -->
    <div class="sl-right relative overflow-hidden" style="background: #eef2ff;">
      <img
        src="https://api.qb-deck.quantumbyte.ai/common/image-generation?prompt=modern+premium+ecommerce+mobile+shopping+app+interface+product+cards+fashion+electronics+vibrant+orange+accent+clean+UI+dark+mode+deals+banner"
        alt="E-Commerce Platform Preview"
        class="w-full h-full object-cover object-center"
      />
      <!-- Left blend into dark panel -->
      <div class="absolute inset-0 pointer-events-none"
           style="background: linear-gradient(to right, #302b63 0%, transparent 30%);"></div>
    </div>

  </div>
</section>
